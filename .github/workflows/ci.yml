name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test suite (unit + integration + replay)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-asyncio httpx ruff

      - name: Lint (ruff)
        run: python -m ruff check agent eval

      - name: Run test suite (skips live-API marker)
        env:
          # Tests don't hit Anthropic — replay cassettes use a stub
          # client. ANTHROPIC_API_KEY is referenced by config so it
          # must be non-empty; SESSION_SECRET is required by main.py.
          ANTHROPIC_API_KEY: ci-fake-key-not-used
          SESSION_SECRET: ci-session-secret-at-least-sixteen-chars
        run: python -m pytest -v
