name: Smoke (deployed env)

# Validates the running deployment end-to-end. Runs:
#   - on demand via the Actions tab (workflow_dispatch)
#   - automatically after every successful CI run on main / staging,
#     so a deploy that breaks /chat shows up red within minutes
#   - on a schedule (every 30 min) to catch external regressions
#     (Anthropic API changes, Langfuse outages, Railway restarts)
#
# Required secrets, scoped per environment (production / staging):
#   SMOKE_BASE_URL         e.g. https://web-production-6259a.up.railway.app
#   SMOKE_USERNAME         a dedicated smoke user provisioned in the deployed app
#   SMOKE_PASSWORD         that user's password
#   SMOKE_TOTP_SECRET      base32 TOTP seed (the value shown when the user enrolled)
#
# If any of those secrets are missing the smoke job degrades to a
# /health-only check rather than failing — useful while wiring up a
# fresh environment.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Which deployment to smoke (production | staging)"
        type: choice
        options: [production, staging]
        default: production
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, staging]
  schedule:
    # Every 30 minutes during business hours (Central Time, M-F).
    # Crontab is UTC; 14:00–23:00 UTC ≈ 9am–6pm CT.
    - cron: "*/30 14-23 * * 1-5"

permissions:
  contents: read

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  smoke:
    name: Smoke ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip if the upstream CI run failed (don't smoke a broken deploy).
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment: ${{ github.event.inputs.environment || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx + pyotp
        run: python -m pip install httpx pyotp

      - name: Smoke /health (always runs)
        env:
          BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::warning::SMOKE_BASE_URL is not set for this environment — skipping."
            exit 0
          fi
          python - <<'PY'
          import os, sys, httpx
          base = os.environ["BASE_URL"].rstrip("/")
          r = httpx.get(f"{base}/health", timeout=15.0)
          print(f"GET {base}/health → {r.status_code} {r.text[:200]}")
          if r.status_code != 200:
              sys.exit(f"::error::/health returned {r.status_code}")
          PY

      - name: Smoke authenticated /chat (skipped if creds absent)
        env:
          BASE_URL: ${{ secrets.SMOKE_BASE_URL }}
          USERNAME: ${{ secrets.SMOKE_USERNAME }}
          PASSWORD: ${{ secrets.SMOKE_PASSWORD }}
          TOTP_SECRET: ${{ secrets.SMOKE_TOTP_SECRET }}
        run: |
          if [ -z "$BASE_URL" ] || [ -z "$USERNAME" ] || [ -z "$PASSWORD" ]; then
            echo "::warning::SMOKE_USERNAME / SMOKE_PASSWORD not set — skipping auth+chat probe."
            exit 0
          fi
          python - <<'PY'
          import os, sys, time, httpx, pyotp

          base = os.environ["BASE_URL"].rstrip("/")
          username = os.environ["USERNAME"]
          password = os.environ["PASSWORD"]
          totp_secret = os.environ.get("TOTP_SECRET", "")

          with httpx.Client(base_url=base, timeout=30.0) as c:
              # 1. Login (may return mfa_required)
              r = c.post("/auth/login", json={"username": username, "password": password})
              print(f"POST /auth/login → {r.status_code}")
              if r.status_code != 200:
                  sys.exit(f"::error::login failed: {r.status_code} {r.text[:300]}")
              body = r.json()

              if body.get("needs_mfa"):
                  if not totp_secret:
                      sys.exit("::error::MFA challenged but SMOKE_TOTP_SECRET not set")
                  code = pyotp.TOTP(totp_secret).now()
                  r = c.post("/auth/mfa/challenge", json={"code": code})
                  print(f"POST /auth/mfa/challenge → {r.status_code}")
                  if r.status_code != 200:
                      sys.exit(f"::error::mfa failed: {r.status_code} {r.text[:300]}")

              # 2. /chat for demo-001
              t0 = time.time()
              r = c.post("/chat", json={"patient_id": "demo-001", "message": "Brief me."})
              dt = time.time() - t0
              print(f"POST /chat → {r.status_code} in {dt:.1f}s")
              # 429 = budget exhausted, not a smoke failure (someone else used the user).
              if r.status_code == 429:
                  print("::warning::budget exhausted; skipping verified-flag check")
                  sys.exit(0)
              if r.status_code != 200:
                  sys.exit(f"::error::chat failed: {r.status_code} {r.text[:500]}")

              data = r.json()
              # Spec contract: every successful response carries `verified` and `trace`.
              if "verified" not in data or "trace" not in data:
                  sys.exit(f"::error::malformed response shape: keys={list(data)[:10]}")
              print(f"verified={data['verified']} cited={len(data['trace'].get('retrieved_source_ids',[]))}")
          PY
