# Pre-commit hooks. Install once with:
#   python -m pip install pre-commit
#   pre-commit install
#
# Then every `git commit` runs the fast subset of checks below.
# CI re-runs the full suite (see .github/workflows/ci.yml) so anything
# slow stays out of the local commit path.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Fast unit subset — verifier + rules + budget. Full suite (auth +
  # integration + replay) runs in CI to keep commits snappy.
  - repo: local
    hooks:
      - id: pytest-fast
        name: pytest (fast unit subset)
        entry: python -m pytest eval/test_verifier.py eval/test_rules.py eval/test_budget.py eval/test_tools.py eval/test_golden_cases.py eval/test_synthetic_tampering.py eval/test_adversarial.py -q
        language: system
        pass_filenames: false
        types_or: [python]
        stages: [pre-commit]
